name: Build and publish CV

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: docker
    steps:
      - uses: actions/checkout@v4

      - name: Install release tools
        run: |
          apt-get update -q
          apt-get install -y --no-install-recommends ca-certificates curl git jq make tar xz-utils

      - name: Install Typst
        run: |
          set -eu

          case "$(uname -m)" in
            x86_64) target="x86_64-unknown-linux-musl" ;;
            aarch64) target="aarch64-unknown-linux-musl" ;;
            *) echo "Unsupported runner architecture: $(uname -m)" >&2; exit 1 ;;
          esac

          version="0.14.2"
          archive="typst-${target}.tar.xz"
          curl -fsSLo "$archive" "https://github.com/typst/typst/releases/download/v${version}/${archive}"
          tar -xf "$archive"
          install -m 0755 "typst-${target}/typst" /usr/local/bin/typst
          typst --version

      - name: Build PDF
        run: make pdf

      - name: Publish latest release
        env:
          PDF: dist/allie-mari-jones-cv.pdf
          ASSET_NAME: allie-mari-jones-cv.pdf
        run: |
          set -eu

          API="${FORGEJO_API_URL:-${GITHUB_API_URL:-https://codeberg.org/api/v1}}"
          REPO="${FORGEJO_REPOSITORY:-${GITHUB_REPOSITORY:-plethu/cv}}"
          SHA="${FORGEJO_SHA:-${GITHUB_SHA}}"
          TOKEN="${FORGEJO_TOKEN:-${GITHUB_TOKEN}}"

          auth_header="Authorization: token ${TOKEN}"
          api_repo="${API}/repos/${REPO}"

          git config user.name "forgejo-actions"
          git config user.email "actions@codeberg.org"
          git tag --force latest "$SHA"
          git push --force origin refs/tags/latest

          release_json="$(mktemp)"
          release_status="$(
            curl -sS -o "$release_json" -w "%{http_code}" \
              -H "$auth_header" \
              -H "accept: application/json" \
              "${api_repo}/releases/tags/latest"
          )"

          if [ "$release_status" = "200" ]; then
            release_id="$(jq -r '.id' "$release_json")"
            curl -fsS -X PATCH \
              -H "$auth_header" \
              -H "Content-Type: application/json" \
              -d "{\"tag_name\":\"latest\",\"target_commitish\":\"${SHA}\",\"name\":\"Latest\",\"body\":\"Latest CV build from ${SHA}.\"}" \
              "${api_repo}/releases/${release_id}" >/dev/null
          elif [ "$release_status" = "404" ]; then
            release_id="$(
              curl -fsS -X POST \
                -H "$auth_header" \
                -H "Content-Type: application/json" \
                -d "{\"tag_name\":\"latest\",\"target_commitish\":\"${SHA}\",\"name\":\"Latest\",\"body\":\"Latest CV build from ${SHA}.\",\"draft\":false,\"prerelease\":false}" \
                "${api_repo}/releases" |
                jq -r '.id'
            )"
          else
            cat "$release_json"
            exit 1
          fi

          assets_json="$(mktemp)"
          curl -fsS \
            -H "$auth_header" \
            -H "accept: application/json" \
            "${api_repo}/releases/${release_id}/assets" >"$assets_json"

          asset_id="$(jq -r --arg name "$ASSET_NAME" '.[] | select(.name == $name) | .id' "$assets_json" | head -n 1)"
          if [ -n "$asset_id" ]; then
            curl -fsS -X DELETE \
              -H "$auth_header" \
              "${api_repo}/releases/${release_id}/assets/${asset_id}" >/dev/null
          fi

          curl -fsS -X POST \
            -H "$auth_header" \
            -F "attachment=@${PDF}" \
            "${api_repo}/releases/${release_id}/assets?name=${ASSET_NAME}" >/dev/null
